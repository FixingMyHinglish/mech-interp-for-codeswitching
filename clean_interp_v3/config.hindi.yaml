model_name: "gpt2"
input_path: "data/hindi.csv"
output_dir: "clean_interp_outputs_v3/gpt2_hindi_full"
device: "cpu"
max_length: 256
log_every: 25
alpha: 0.05
min_pairs: 8
chunk_size: 512
token_offsets: [-1, 0, 1]
target_mode: "predicted_next_token"
comparisons:
  - name: "code_switched_vs_english"
    focus_condition: "code_switched"
    baseline_condition: "english"
  - name: "code_switched_vs_target"
    focus_condition: "code_switched"
    baseline_condition: "target_language"
  - name: "confused_vs_english"
    focus_condition: "confused"
    baseline_condition: "english"
  - name: "confused_vs_target"
    focus_condition: "confused"
    baseline_condition: "target_language"
phenomena:
  - name: "code_switched"
    focus_condition: "code_switched"
    required_baselines:
      - "english"
      - "target_language"
    top_k: 50
  - name: "confused"
    focus_condition: "confused"
    required_baselines:
      - "english"
      - "target_language"
    top_k: 50
