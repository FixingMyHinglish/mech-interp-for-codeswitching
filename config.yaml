# model_name: "meta-llama/Llama-3.2-3B-Instruct"
model_name: "gpt2"
input_path: "data/french.csv"
output_dir: "outputs/GPT2_french"

device: "mps"          # auto|cpu|cuda
max_length: 256
batch_size: 10            # currently processed per sample

# Optional; if omitted, TunedLens will try default mapping for model_name.
# tuned_lens_resource_id: "gpt2"
concept_column: "condition"

topk_neurons: 100
save_full_neuron_activations: true
full_neuron_export_gzip: true
full_neuron_round_decimals: 3
full_neuron_topk_per_layer: 256
full_neuron_sample_stride: 1
full_neuron_min_layer_exclusive: 19


# Optional. If omitted, pipeline auto-picks a condition containing "english".
# reference_condition: "english"
